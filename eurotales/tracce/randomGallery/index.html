<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracce Slider</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background-color: #fbf3ea;
    }

    .slider-container {
      position: relative;
      width: 100%;
      height: calc(100vw / 3); 
      overflow: hidden;
    }

    .slide-wrapper {
      display: flex;
      transition: transform 0.6s ease;
      height: 50%;
    }

    .slide-group {
      display: flex;
      flex: 0 0 100%;
      height: 100%;
    }

    .slide {
      flex: 0 0 33.3333%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .slide a {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
      position: relative;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slide-title {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      color: #fff;
      background-color: rgba(0, 0, 0, 0.6);
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 16px;
    }

    .nav-btn {
      position: absolute;
      top: 25%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      font-size: 22px;
      background: rgba(0,0,0,0.4);
      color: white;
      border: none;
      cursor: pointer;
      z-index: 2;
      user-select: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover {
      background: rgba(0,0,0,0.6);
    }

    .prev-btn { left: 10px; }
    .next-btn { right: 10px; }
  </style>
</head>
<body>

  <div class="slider-container">
    <button class="nav-btn prev-btn" onclick="changeSlide(-1)">❮</button>
    <button class="nav-btn next-btn" onclick="changeSlide(1)">❯</button>
    <div class="slide-wrapper" id="slideWrapper"></div>
  </div>

  <script>
    let currentIndex = 0;
    let totalGroups = 0;

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function createSlide(item) {
      const slide = document.createElement("div");
      slide.className = "slide";

      const link = document.createElement("a");
      link.href = `https://eurotales.eu/scheda/?id=${item.id}`;

      const img = document.createElement("img");
      img.src = `https://www.directuseurotales.ambientinarratividigitali.it/assets/${item.img_cover}`;
      img.alt = item.titolo;

      const title = document.createElement("div");
      title.className = "slide-title";
      title.textContent = item.titolo;

      link.appendChild(img);
      link.appendChild(title);
      slide.appendChild(link);

      return slide;
    }

    function changeSlide(n) {
      currentIndex = (currentIndex + n + totalGroups) % totalGroups;
      const wrapper = document.getElementById("slideWrapper");
      wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    fetch("https://www.directuseurotales.ambientinarratividigitali.it/items/tracce?fields=*,cronologia.*&filter[stato_traccia][_eq]=4")
      .then(response => response.json())
      .then(data => {
        const tracce = shuffleArray(data.data.filter(item => item.img_cover));
        const wrapper = document.getElementById("slideWrapper");

        for (let i = 0; i < tracce.length; i += 3) {
          const group = document.createElement("div");
          group.className = "slide-group";

          for (let j = 0; j < 3 && i + j < tracce.length; j++) {
            const slide = createSlide(tracce[i + j]);
            group.appendChild(slide);
          }

          wrapper.appendChild(group);
          totalGroups++;
        }

        if (totalGroups > 0) {
          setInterval(() => changeSlide(1), 4000);
        }
      })
      .catch(error => {
        console.error("Errore nel caricamento delle tracce:", error);
      });
  </script>
</body>
</html>
